<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
body {
    background: black;
    color: white;
    font-family: Arial;
    font-weight: bold;
    text-align: center;
    margin-top: 150px;
}
input, button {
    padding: 10px;
    margin: 10px;
    width: 250px;
    border: none;
}
button {
    background: white;
    color: black;
    cursor: pointer;
}
</style>
</head>
<body>

<h2>Logowanie</h2>

<input type="email" id="email" placeholder="Wpisz email"><br>
<button onclick="login()">Zaloguj</button>

<script>
function login() {
    let email = document.getElementById("email").value;

    if(email === "bronislaw@interia.eu"){
        window.location.href = "index.html";
    } else {
        alert("Nieprawidłowy email");
    }
}
</script>

</body>
</html>
